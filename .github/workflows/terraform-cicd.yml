      - name: Terraform plan
        run: terraform plan -var-file=env/${{ env.DEPLOYMENT_ENV_NAME }}.tfvars -out=tfplan
        working-directory: ${{ env.TF_ROOT }}

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: contact-flows-plan
          path: ${{ env.TF_ROOT }}/tfplan

  contact-flows-deploy:
    needs: contact-flows-plan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: contact-flows-${{ env.DEPLOYMENT_ENV_NAME }}
    env:
