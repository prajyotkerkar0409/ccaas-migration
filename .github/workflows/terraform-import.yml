name: Terraform Import Amazon Connect

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment"
        required: true
        default: "sandbox"
        type: choice
        options:
          - sandbox

      connect_instance_id:
        description: "Amazon Connect Instance ID"
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  TF_ROOT: modules/connect-instance/Terraform
  AWS_REGION: us-east-1

jobs:
  terraform-import:
    name: Import Amazon Connect Instance
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
        working-directory: ${{ env.TF_ROOT }}

    steps:

    #------------------------------------------------------------
    # Checkout Repository
    #------------------------------------------------------------
    - name: Checkout Repository
      uses: actions/checkout@v4

    #------------------------------------------------------------
    # Setup Terraform
    #------------------------------------------------------------
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.5.7

    #------------------------------------------------------------
    # Configure AWS Credentials
    #------------------------------------------------------------
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v3
      with:
        role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
        aws-region: ${{ secrets.AWS_REGION }}

      
    #--------------------------------------------------aws----------
    # Terraform Init
    #------------------------------------------------------------
    - name: Terraform Init
      run: terraform init
      working-directory: ${{ env.TF_ROOT }}

    #------------------------------------------------------------
    # Terraform Import
    #------------------------------------------------------------
    - name: Import Amazon Connect Instance
      working-directory: environments/sandbox
      run: |
        terraform import \
        -var-file=sandbox.tfvars \
        module.connect_instance.aws_connect_instance.this \
        "${{ github.event.inputs.connect_instance_id }}"

    #------------------------------------------------------------
    # Terraform Validate
    #------------------------------------------------------------
    - name: Terraform Validate
      run: terraform validate
      working-directory: ${{ env.TF_ROOT }}
    #------------------------------------------------------------
    # Terraform Plan
    #------------------------------------------------------------
    - name: Terraform Plan
      run: |
        terraform plan \
        -var-file=env/sandbox.tfvars

    #------------------------------------------------------------
    # Show Terraform State
    #------------------------------------------------------------
    - name: Show Imported Resource
      run: |
        terraform state list
        terraform state show module.connect_instance.aws_connect_instance.this